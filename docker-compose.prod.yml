version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-product_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: ghcr.io/${REGISTRY_USERNAME}/product-management-fastapi/backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-product_db}
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/products"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${REGISTRY_USERNAME}/product-management-fastapi/frontend:${IMAGE_TAG:-latest}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    environment:
      REACT_APP_API_URL: http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_prod_data:
